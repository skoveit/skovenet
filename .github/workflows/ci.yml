name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test (fast)
        run: go test -v -count=1 -race -short ./pkg/...

      - name: Test (timeout)
        run: go test -v -count=1 -run TestExecute_Timeout ./pkg/command/
